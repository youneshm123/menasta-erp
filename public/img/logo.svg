<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0070f2"/>
      <stop offset="100%" style="stop-color:#4fa3e0"/>
    </linearGradient>
  </defs>

  <!-- Icon square -->
  <rect x="0" y="0" width="60" height="60" rx="12" fill="url(#logoGrad)"/>

  <!-- Fuel pump icon (lucide-style, scaled to 60×60 canvas, centered) -->
  <g transform="translate(11, 9) scale(1.58)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- pump body -->
    <rect x="2" y="3" width="12" height="18" rx="2"/>
    <!-- fuel nozzle arm -->
    <path d="M14 7h2a2 2 0 0 1 2 2v3a2 2 0 0 0 2 2h0"/>
    <!-- nozzle tip -->
    <path d="M18 14v3a1 1 0 0 1-1 1h-1"/>
    <!-- fuel fill cap -->
    <path d="M6 8h4"/>
  </g>

  <!-- Brand name -->
  <text x="74" y="36" font-family="Inter,system-ui,sans-serif" font-size="26" font-weight="800" letter-spacing="-0.5" fill="#1a2a3a">MENASTA</text>

  <!-- Tagline -->
  <text x="76" y="52" font-family="Inter,system-ui,sans-serif" font-size="10.5" font-weight="500" letter-spacing="1.2" fill="#6a6d70">STATION SERVICE ERP</text>
</svg>
